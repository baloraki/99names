<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Daily Husna logo</title>
  <desc id="desc">A glowing gold logo with a crescent, dome, Arabic Allah calligraphy and the words Daily Husna.</desc>
  <defs>
